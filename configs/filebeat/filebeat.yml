# ============================================================
# filebeat.yml — Configuration collecte de logs
# Projet NSM Lab — DIC2 Cybersécurité ESP Dakar
# ============================================================

filebeat.inputs:

  # Logs ARPWatch
  - type: log
    enabled: true
    paths:
      - /nsm/logs/arpwatch/*.log
    fields:
      source_type: arpwatch
    fields_under_root: true

  # Logs Suricata (format JSON)
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      source_type: suricata
    fields_under_root: true

  # Logs Snort 3
  - type: log
    enabled: true
    paths:
      - /var/log/snort/*.log
    fields:
      source_type: snort3
    fields_under_root: true

  # Logs pfSense (via rsyslog)
  - type: log
    enabled: true
    paths:
      - /var/log/pfsense/*.log
    fields:
      source_type: pfsense
    fields_under_root: true

  # Flux NetFlow
  - type: log
    enabled: true
    paths:
      - /nsm/netflow/*.nfcapd
    fields:
      source_type: netflow
    fields_under_root: true

# Sortie vers Elasticsearch
output.elasticsearch:
  hosts: ["127.0.0.1:9200"]
  index: "nsm-lab-%{+yyyy.MM.dd}"

# Configuration Kibana
setup.kibana:
  host: "127.0.0.1:5601"

# Paramètres généraux
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat.log
  keepfiles: 7
